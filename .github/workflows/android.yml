name: Build and Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Prepare web files
        run: |
          mkdir -p www
          cp index.html app.js style.css www/
          cp *.png www/ 2>/dev/null || true
          cp *.jpg www/ 2>/dev/null || true

      - name: Install Dependencies
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .

      - name: Initialize Capacitor for Android
        run: |
          npx cap init "HamkorBank" "com.hamkor.app" --web-dir www
          npx cap add android
          # Set the server URL to point to GitHub Pages for live updates
          sed -i 's|"webDir": "www"|"webDir": "www", "server": { "url": "https://salom0227.github.io/ttttt/", "cleartext": true }|' capacitor.config.json
          npx cap sync android

      - name: Fix Kotlin Duplicate Classes
        run: |
          # Add exclusion rule to avoid Kotlin duplicate class errors
          echo 'configurations.all { resolutionStrategy { exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk7"; exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk8" } }' >> android/app/build.gradle

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
